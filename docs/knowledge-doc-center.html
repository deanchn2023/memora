<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品架构师知识文档中心</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  :root {
    --bg-page: #f5f6fa;
    --bg-card: #ffffff;
    --bg-sidebar: #ffffff;
    --bg-hover: #f0f4ff;
    --bg-active: #e8eeff;
    --primary: #3b5bdb;
    --primary-light: #edf2ff;
    --primary-dark: #2f4ac0;
    --text-main: #1a1b2e;
    --text-secondary: #5a5c7a;
    --text-muted: #8b8ea3;
    --border: #e2e4ef;
    --border-light: #eef0f7;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg-page);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    width: 40px; height: 40px;
    background: var(--primary);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px;
  }
  .header-title {
    font-size: 18px; font-weight: 600; color: var(--text-main);
  }
  .header-title span {
    font-size: 13px; font-weight: 400; color: var(--text-muted);
    margin-left: 8px;
  }
  .header-right {
    display: flex; align-items: center; gap: 12px;
  }
  .search-box {
    position: relative;
    width: 360px;
  }
  .search-box input {
    width: 100%;
    padding: 10px 14px 10px 40px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 14px;
    background: var(--bg-page);
    outline: none;
    transition: all 0.2s;
  }
  .search-box input:focus {
    border-color: var(--primary);
    background: var(--bg-card);
    box-shadow: 0 0 0 3px var(--primary-light);
  }
  .search-box i {
    position: absolute;
    left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
  }
  .view-toggle {
    display: flex;
    background: var(--bg-page);
    border-radius: var(--radius-sm);
    padding: 3px;
    border: 1px solid var(--border);
  }
  .view-toggle button {
    background: none; border: none;
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 14px;
    transition: all 0.2s;
  }
  .view-toggle button.active {
    background: var(--bg-card);
    color: var(--primary);
    box-shadow: var(--shadow-sm);
  }

  /* Layout */
  .main {
    display: flex;
    flex: 1;
    max-width: 1440px;
    width: 100%;
    margin: 0 auto;
    padding: 24px 32px;
    gap: 24px;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--bg-sidebar);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 20px 0;
    height: fit-content;
    position: sticky;
    top: 88px;
  }
  .sidebar-title {
    font-size: 12px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    padding: 0 20px 12px;
  }
  .cat-group {
    margin-bottom: 4px;
  }
  .cat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px;
    cursor: pointer;
    font-size: 14px; font-weight: 500;
    color: var(--text-main);
    transition: background 0.15s;
    user-select: none;
  }
  .cat-header:hover { background: var(--bg-hover); }
  .cat-header.active { background: var(--bg-active); color: var(--primary); }
  .cat-header.active .cat-icon { color: var(--primary); }
  .cat-header .cat-left {
    display: flex; align-items: center; gap: 10px;
  }
  .cat-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    color: var(--text-secondary);
    background: var(--bg-page);
  }
  .cat-count {
    font-size: 12px; color: var(--text-muted);
    background: var(--bg-page);
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 500;
  }
  .cat-children {
    display: none;
    padding: 4px 0;
  }
  .cat-children.open { display: block; }
  .cat-child {
    padding: 8px 20px 8px 58px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .cat-child:hover { color: var(--primary); background: var(--bg-hover); }
  .cat-child.active { color: var(--primary); background: var(--bg-active); font-weight: 500; }
  .cat-child .child-count {
    font-size: 11px; color: var(--text-muted);
  }

  /* Content area */
  .content {
    flex: 1;
    min-width: 0;
  }
  .content-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .content-title {
    font-size: 20px; font-weight: 600;
  }
  .content-title .count-badge {
    font-size: 13px; font-weight: 400;
    color: var(--text-muted);
    margin-left: 8px;
  }
  .sort-dropdown {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-card);
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    outline: none;
  }

  /* Grid view */
  .doc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .doc-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 20px;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
  }
  .doc-card:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--primary-light);
    transform: translateY(-2px);
  }
  .doc-card-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 12px;
  }
  .doc-type-icon {
    width: 40px; height: 40px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .doc-type-icon.pdf { background: #ffeaea; color: #e24b4a; }
  .doc-type-icon.word { background: #e6f1fb; color: #378add; }
  .doc-type-icon.ppt { background: #faeeda; color: #ba7517; }
  .doc-type-icon.excel { background: #eaf3de; color: #639922; }
  .doc-type-icon.link { background: #e1f5ee; color: #1d9e75; }
  .doc-actions {
    display: flex; gap: 6px;
  }
  .doc-actions button {
    width: 32px; height: 32px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-card);
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: all 0.2s;
  }
  .doc-actions button:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-light);
  }
  .doc-title {
    font-size: 15px; font-weight: 600;
    margin-bottom: 6px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .doc-desc {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 14px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .doc-meta {
    display: flex; align-items: center; gap: 12px;
    font-size: 12px; color: var(--text-muted);
    padding-top: 12px;
    border-top: 1px solid var(--border-light);
  }
  .doc-meta span {
    display: flex; align-items: center; gap: 4px;
  }
  .doc-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px; font-weight: 500;
    margin-bottom: 10px;
  }
  .tag-arch { background: #e6f1fb; color: #185fa5; }
  .tag-tech { background: #eaf3de; color: #3b6d11; }
  .tag-guide { background: #faeeda; color: #854f0b; }
  .tag-api { background: #fbeaf0; color: #993556; }
  .tag-ref { background: #f1efe8; color: #5f5e5a; }

  /* List view */
  .doc-list {
    display: none;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  .doc-list.active { display: block; }
  .list-row {
    display: grid;
    grid-template-columns: 40px 1fr 140px 120px 100px 140px;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-light);
    transition: background 0.15s;
    cursor: pointer;
  }
  .list-row:hover { background: var(--bg-hover); }
  .list-row:last-child { border-bottom: none; }
  .list-header {
    background: var(--bg-page);
    font-size: 12px; font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    cursor: default;
  }
  .list-header:hover { background: var(--bg-page); }
  .list-title {
    font-size: 14px; font-weight: 500;
  }
  .list-desc {
    font-size: 12px; color: var(--text-muted);
    margin-top: 2px;
  }
  .list-type {
    font-size: 12px; font-weight: 500;
    padding: 3px 10px;
    border-radius: 4px;
    display: inline-block;
    text-align: center;
  }
  .list-actions {
    display: flex; gap: 6px;
  }
  .list-actions button {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; gap: 4px;
    transition: all 0.2s;
  }
  .list-actions button:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-light);
  }
  .list-actions button.primary {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .list-actions button.primary:hover {
    background: var(--primary-dark);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .empty-state i {
    font-size: 48px;
    margin-bottom: 16px;
    color: var(--border);
  }
  .empty-state h3 {
    font-size: 16px; font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .empty-state p {
    font-size: 14px;
  }

  /* Breadcrumb */
  .breadcrumb {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text-muted);
    margin-bottom: 12px;
  }
  .breadcrumb a {
    color: var(--primary);
    text-decoration: none;
    cursor: pointer;
  }
  .breadcrumb a:hover { text-decoration: underline; }
  .breadcrumb i { font-size: 10px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px; right: 30px;
    background: var(--text-main);
    color: #fff;
    padding: 12px 20px;
    border-radius: var(--radius-md);
    font-size: 14px;
    box-shadow: var(--shadow-md);
    display: flex; align-items: center; gap: 10px;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast i { color: #5dcaa5; }

  /* Responsive */
  @media (max-width: 1024px) {
    .sidebar { display: none; }
    .search-box { width: 240px; }
  }
  @media (max-width: 768px) {
    .header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
    .main { padding: 16px; }
    .doc-grid { grid-template-columns: 1fr; }
    .search-box { width: 100%; }
  }
</style>
</head>

    <!-- List View -->

        <div>类型</div>
        <div>更新日期</div>

      <h3>未找到相关文档</h3>
      <p>请尝试更换关键词或选择其他分类</p>
    </div>
  </section>
</div>

<!-- Toast -->
<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg">下载成功</span></div>

// ===== 状态 =====
let currentView = 'grid';
let currentFilter = 'all';
let currentSubFilter = null;
let searchQuery = '';
let favorites = new Set();

// ===== 初始化 =====
function init() {
  renderCategories();
  renderDocs();
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase();
    renderDocs();
  });
}

// ===== 渲染分类树 =====
function renderCategories() {
  const tree = document.getElementById('categoryTree');
  let html = `
    <div class="cat-group">
      <div class="cat-header ${currentFilter === 'all' ? 'active' : ''}" onclick="filterCategory('all')">
        <div class="cat-left">
          <div class="cat-icon" style="background:#edf2ff;color:#3b5bdb"><i class="fas fa-th-large"></i></div>
          <span>全部文档</span>
        </div>
        <span class="cat-count">${docs.length}</span>
      </div>
    </div>
  `;
  categories.forEach(cat => {
    const isActive = currentFilter === cat.id;
    const isOpen = isActive || currentFilter === cat.id;
    html += `
      <div class="cat-group">
        <div class="cat-header ${isActive ? 'active' : ''}" onclick="toggleCategory('${cat.id}')">
          <div class="cat-left">
            <div class="cat-icon" style="background:${cat.color}15;color:${cat.color}"><i class="fas ${cat.icon}"></i></div>
            <span>${cat.name}</span>
          </div>
          <span class="cat-count">${cat.count}</span>
        </div>
        <div class="cat-children ${isOpen ? 'open' : ''}" id="children-${cat.id}">
          ${cat.children.map(child => `
            <div class="cat-child ${currentSubFilter === child.id ? 'active' : ''}" onclick="filterSubcategory('${cat.id}', '${child.id}', event)">
              ${child.name}
              <span class="child-count">${child.count}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });
  tree.innerHTML = html;
}

function toggleCategory(catId) {
  const el = document.getElementById('children-' + catId);
  el.classList.toggle('open');
}

// ===== 过滤逻辑 =====
function filterCategory(catId) {
  currentFilter = catId;
  currentSubFilter = null;
  renderCategories();
  renderDocs();
  updateBreadcrumb();
}

function filterSubcategory(catId, subId, event) {
  event.stopPropagation();
  currentFilter = catId;
  currentSubFilter = subId;
  renderCategories();
  renderDocs();
  updateBreadcrumb();
}

function getFilteredDocs() {
  return docs.filter(doc => {
    const matchCat = currentFilter === 'all' || doc.category === currentFilter;
    const matchSub = !currentSubFilter || doc.subcategory === currentSubFilter;
    const matchSearch = !searchQuery ||
      doc.title.toLowerCase().includes(searchQuery) ||
      doc.desc.toLowerCase().includes(searchQuery);
    return matchCat && matchSub && matchSearch;
  });
}

// ===== 渲染文档 =====
function renderDocs() {
  const filtered = getFilteredDocs();
  document.getElementById('docCount').textContent = `共 ${filtered.length} 份`;

  const grid = document.getElementById('docGrid');
  const listBody = document.getElementById('docListBody');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    listBody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  // Grid
  grid.innerHTML = filtered.map(doc => {
    const typeInfo = getTypeInfo(doc.type);
    const catName = getCategoryName(doc.category);
    return `
      <div class="doc-card" onclick="previewDoc(${doc.id})">
        <div class="doc-card-header">
          <div class="doc-type-icon ${doc.type}"><i class="fas ${typeInfo.icon}"></i></div>
          <div class="doc-actions" onclick="event.stopPropagation()">
            <button onclick="toggleFav(${doc.id})" title="收藏">
              <i class="${favorites.has(doc.id) ? 'fas' : 'far'} fa-star" style="${favorites.has(doc.id) ? 'color:#ef9f27' : ''}"></i>
            </button>
            <button onclick="downloadDoc(${doc.id})" title="下载"><i class="fas fa-download"></i></button>
          </div>
        </div>
        <div class="doc-tag tag-${doc.tag}">${getTagLabel(doc.tag)}</div>
        <div class="doc-title">${doc.title}</div>
        <div class="doc-desc">${doc.desc}</div>
        <div class="doc-meta">
          <span><i class="fas fa-folder" style="font-size:10px"></i> ${catName}</span>
          <span><i class="fas fa-file" style="font-size:10px"></i> ${typeInfo.label}</span>
          <span><i class="fas fa-calendar" style="font-size:10px"></i> ${doc.updated}</span>
        </div>
      </div>
    `;
  }).join('');

  // List
  listBody.innerHTML = filtered.map(doc => {
    const typeInfo = getTypeInfo(doc.type);
    const catName = getCategoryName(doc.category);
    return `
      <div class="list-row" onclick="previewDoc(${doc.id})">
        <div class="doc-type-icon ${doc.type}" style="width:32px;height:32px;font-size:14px"><i class="fas ${typeInfo.icon}"></i></div>
        <div>
          <div class="list-title">${doc.title}</div>
          <div class="list-desc">${doc.desc}</div>
        </div>
        <div style="font-size:13px;color:var(--text-secondary)">${catName}</div>
        <div><span class="list-type" style="background:${typeInfo.bg};color:${typeInfo.color}">${typeInfo.label}</span></div>
        <div style="font-size:13px;color:var(--text-muted)">${doc.updated}</div>
        <div class="list-actions" onclick="event.stopPropagation()">
          <button onclick="toggleFav(${doc.id})"><i class="${favorites.has(doc.id) ? 'fas' : 'far'} fa-star"></i></button>
          <button class="primary" onclick="downloadDoc(${doc.id})"><i class="fas fa-download"></i> 下载</button>
        </div>
      </div>
    `;
  }).join('');
}

// ===== 辅助函数 =====
function getTypeInfo(type) {
  const map = {
    pdf: { icon: 'fa-file-pdf', label: 'PDF', bg: '#ffeaea', color: '#e24b4a' },
    word: { icon: 'fa-file-word', label: 'Word', bg: '#e6f1fb', color: '#378add' },
    ppt: { icon: 'fa-file-powerpoint', label: 'PPT', bg: '#faeeda', color: '#ba7517' },
    excel: { icon: 'fa-file-excel', label: 'Excel', bg: '#eaf3de', color: '#639922' },
    link: { icon: 'fa-link', label: '在线', bg: '#e1f5ee', color: '#1d9e75' }
  };
  return map[type] || map.pdf;
}

function getTagLabel(tag) {
  const map = { arch: '架构', tech: '技术', guide: '指南', api: 'API', ref: '参考' };
  return map[tag] || tag;
}

function getCategoryName(catId) {
  if (catId === 'all') return '全部';
  const cat = categories.find(c => c.id === catId);
  return cat ? cat.name : catId;
}

function getCurrentCategoryName() {
  if (currentFilter === 'all') return '全部文档';
  const cat = categories.find(c => c.id === currentFilter);
  if (!cat) return '全部文档';
  if (currentSubFilter) {
    const sub = cat.children.find(c => c.id === currentSubFilter);
    return sub ? `${cat.name} / ${sub.name}` : cat.name;
  }
  return cat.name;
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const title = document.getElementById('currentCategory');
  title.textContent = getCurrentCategoryName();
  if (currentFilter === 'all') {
    bc.innerHTML = `<a onclick="filterCategory('all')">全部文档</a>`;
  } else {
    const cat = categories.find(c => c.id === currentFilter);
    if (currentSubFilter) {
      const sub = cat.children.find(c => c.id === currentSubFilter);
      bc.innerHTML = `<a onclick="filterCategory('all')">全部文档</a> <i class="fas fa-chevron-right"></i> <a onclick="filterCategory('${cat.id}')">${cat.name}</a> <i class="fas fa-chevron-right"></i> <span>${sub.name}</span>`;
    } else {
      bc.innerHTML = `<a onclick="filterCategory('all')">全部文档</a> <i class="fas fa-chevron-right"></i> <span>${cat.name}</span>`;
    }
  }
}

// ===== 视图切换 =====
function setView(view) {
  currentView = view;
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.toggle('active', false));
  event.currentTarget.classList.add('active');
  document.getElementById('docGrid').style.display = view === 'grid' ? 'grid' : 'none';
  document.getElementById('docList').classList.toggle('active', view === 'list');
}

// ===== 排序 =====
function sortDocs() {
  const sort = document.getElementById('sortSelect').value;
  if (sort === 'newest') {
    docs.sort((a, b) => new Date(b.updated) - new Date(a.updated));
  } else if (sort === 'name') {
    docs.sort((a, b) => a.title.localeCompare(b.title, 'zh'));
  } else if (sort === 'type') {
    docs.sort((a, b) => a.type.localeCompare(b.type));
  }
  renderDocs();
}

// ===== 操作 =====
function toggleFav(id) {
  if (favorites.has(id)) favorites.delete(id);
  else favorites.add(id);
  renderDocs();
}

function downloadDoc(id) {
  const doc = docs.find(d => d.id === id);
  showToast(`「${doc.title}」开始下载...`);
}

function previewDoc(id) {
  const doc = docs.find(d => d.id === id);
  showToast(`正在打开「${doc.title}」...`);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== 启动 =====
init();
</script>
