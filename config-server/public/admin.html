<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memora 管理后台</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
  <!-- 登录页 -->
  <div id="login-page" class="page active">
    <div class="login-card">
      <div class="login-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="#007AFF"/>
          <path d="M14 24L21 31L34 18" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="login-title">Memora</h1>
      <p class="login-subtitle">组织配置管理后台</p>
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="login-email" placeholder="admin@memora.com" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="login-password" placeholder="输入密码" required>
        </div>
        <button type="submit" class="btn-primary btn-login">登录</button>
        <p id="login-error" class="error-text" style="display:none"></p>
      </form>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="admin-page" class="page">
    <!-- 顶部导航 -->
    <header class="top-bar">
      <div class="top-bar-left">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="#007AFF"/>
          <path d="M14 24L21 31L34 18" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="top-bar-title">Memora 管理后台</span>
      </div>
      <div class="top-bar-right">
        <span id="user-info" class="user-info"></span>
        <button id="btn-logout" class="btn-ghost">退出登录</button>
      </div>
    </header>

    <!-- 标签导航 -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="dashboard">仪表盘</button>
      <button class="tab-btn" data-tab="orgs">组织管理</button>
      <button class="tab-btn" data-tab="users">用户管理</button>
      <button class="tab-btn" data-tab="config">配置编辑</button>
    </nav>

    <!-- 内容区 -->
    <main class="content-area">
      <!-- 仪表盘 -->
      <section id="tab-dashboard" class="tab-content active">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon blue">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <div class="stat-info">
              <span class="stat-value" id="stat-users">0</span>
              <span class="stat-label">用户总数</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
            </div>
            <div class="stat-info">
              <span class="stat-value" id="stat-orgs">0</span>
              <span class="stat-label">组织数</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon orange">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <div class="stat-info">
              <span class="stat-value" id="stat-admins">0</span>
              <span class="stat-label">管理员</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon purple">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </div>
            <div class="stat-info">
              <span class="stat-value" id="stat-configs">0</span>
              <span class="stat-label">已配置组织</span>
            </div>
          </div>
        </div>
        <div class="section-card">
          <h3>快速操作</h3>
          <div class="quick-actions">
            <button class="btn-secondary" onclick="switchTab('orgs')">创建组织</button>
            <button class="btn-secondary" onclick="switchTab('users')">添加用户</button>
            <button class="btn-secondary" onclick="switchTab('config')">编辑配置</button>
          </div>
        </div>
      </section>

      <!-- 组织管理 -->
      <section id="tab-orgs" class="tab-content">
        <div class="section-header">
          <h2>组织管理</h2>
          <button class="btn-primary btn-sm" id="btn-create-org">+ 新建组织</button>
        </div>
        <div id="orgs-list" class="data-list"></div>
      </section>

      <!-- 用户管理 -->
      <section id="tab-users" class="tab-content">
        <div class="section-header">
          <h2>用户管理</h2>
          <button class="btn-primary btn-sm" id="btn-create-user">+ 新建用户</button>
        </div>
        <div id="users-list" class="data-list"></div>
      </section>

      <!-- 配置编辑 -->
      <section id="tab-config" class="tab-content">
        <div class="section-header">
          <h2>配置编辑</h2>
          <div class="header-actions">
            <select id="config-org-select" class="select-input">
              <option value="">选择组织</option>
            </select>
            <button class="btn-primary btn-sm" id="btn-save-config">保存配置</button>
          </div>
        </div>
        <div id="config-editor-wrap" class="config-editor-wrap">
          <div class="config-tabs">
            <button class="config-tab active" data-section="api">API 配置</button>
            <button class="config-tab" data-section="adp">ADP 配置</button>
            <button class="config-tab" data-section="prompts">提示词</button>
            <button class="config-tab" data-section="policies">策略</button>
            <button class="config-tab" data-section="raw">原始 JSON</button>
          </div>
          <div id="config-sections" class="config-sections"></div>
        </div>
        <div id="config-empty" class="empty-state" style="display:none">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#aeaeb2" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg>
          <p>请先选择一个组织</p>
        </div>
      </section>
    </main>
  </div>

  <!-- 弹窗 -->
  <div id="modal-overlay" class="modal-overlay">
    <div id="modal-box" class="modal-box"></div>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <script src="/admin/admin.js"></script>
</body>
</html>
