<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F8EF7"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6BA3FF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <!-- 圆角矩形背景 -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bg)"/>
  <!-- 光晕效果 -->
  <ellipse cx="180" cy="160" rx="200" ry="160" fill="url(#glow)" opacity="0.3"/>
  <!-- 记忆之环 - 外环 -->
  <circle cx="256" cy="240" r="120" fill="none" stroke="white" stroke-width="8" opacity="0.3"/>
  <!-- 记忆之环 - 内环 -->
  <circle cx="256" cy="240" r="80" fill="none" stroke="white" stroke-width="4" opacity="0.2"/>
  <!-- 中心点 - 记忆核心 -->
  <circle cx="256" cy="240" r="28" fill="white" opacity="0.95"/>
  <!-- 连接线 - 记忆关联 -->
  <line x1="256" y1="240" x2="176" y2="160" stroke="white" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="256" y1="240" x2="336" y2="160" stroke="white" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="256" y1="240" x2="176" y2="320" stroke="white" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="256" y1="240" x2="336" y2="320" stroke="white" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <!-- 节点 - 记忆碎片 -->
  <circle cx="176" cy="160" r="12" fill="white" opacity="0.8"/>
  <circle cx="336" cy="160" r="12" fill="white" opacity="0.8"/>
  <circle cx="176" cy="320" r="12" fill="white" opacity="0.8"/>
  <circle cx="336" cy="320" r="12" fill="white" opacity="0.8"/>
  <!-- 文字 -->
  <text x="256" y="440" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, sans-serif" font-size="56" font-weight="700" letter-spacing="-1">Memora</text>
</svg>
